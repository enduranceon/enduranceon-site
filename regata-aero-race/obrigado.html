<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Enviado - Endurance On</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #111 0%, #1c1c1c 60%, #222 100%);
            display: grid;
            place-items: center;
            padding: 20px;
        }
        .overlay {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
            padding: 34px 28px;
            text-align: center;
        }
        .tag {
            display: inline-block;
            background: #fff3e8;
            color: #FF8012;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            padding: 5px 10px;
            border-radius: 999px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 30px;
            color: #111;
            margin-bottom: 10px;
            line-height: 1.2;
        }
        p {
            color: #555;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 24px;
        }
        .ok-btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #FF8012;
            color: #fff;
            font-size: 16px;
            font-weight: 800;
            padding: 14px 18px;
            cursor: pointer;
        }
        .ok-btn:hover { background: #e06e00; }
    </style>
</head>
<body>
    <div class="overlay" role="dialog" aria-labelledby="titulo-ok" aria-modal="true">
        <span class="tag">Endurance On</span>
        <h1 id="titulo-ok">Pedido enviado com sucesso!</h1>
        <p>Recebemos seu formulario. Clique em OK para voltar para a pagina do pedido.</p>
        <button class="ok-btn" id="okButton" type="button">OK</button>
    </div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var voltar = params.get('voltar') || 'index.html';
        document.getElementById('okButton').addEventListener('click', function () {
            window.location.href = './' + voltar;
        });
    </script>
</body>
</html>
