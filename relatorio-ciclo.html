<body>

            </nav>
        </header>
        
        <!-- Wrapper para impressão - mantém tudo junto -->
        <div class="print-wrapper">
            <div class="report-header">
                <img src="img/logo-horizontal-preta.png" alt="Endurance On" class="report-logo">

                            <th style="width: 20%;">Data de Início</th>

                <i class="fas fa-print"></i> Imprimir / Salvar PDF

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Recuperar dados do localStorage com tratamento de erro
            let cicloData;
            try {
                const rawData = localStorage.getItem('cicloData');
                console.log("Dados brutos do localStorage:", rawData);
                cicloData = JSON.parse(rawData);
                
                if (!cicloData) {
                    throw new Error("Dados não encontrados");
                }
            } catch (error) {
                console.error("Erro ao carregar dados:", error);
                alert('Dados do ciclo não encontrados ou inválidos. Redirecionando para o formulário.');
                window.location.href = 'ciclo-provas.html';
                return;
            }
            
            // Debug - verificar se as observações estão presentes
            console.log("Dados do ciclo carregados:", cicloData);
            if (cicloData.periods) {
                cicloData.periods.forEach((period, index) => {
                    console.log(`Período ${index+1} (${period.name}): Observação = "${period.observation || 'vazia'}"`);
                });
            } else {
                console.error("Períodos não encontrados nos dados!");
            }
            
            // Preencher informações gerais
            fillInfoSection(cicloData);
            
            // Legenda removida conforme solicitado pelo usuário
            // generateLegend(cicloData.periods);
            
            // Gerar tabela do ciclo
            generateCycleTable(cicloData);
        });
        
        function fillInfoSection(data) {
            const infoSection = document.getElementById('info-section');
            
            // Formatação manual da data para evitar problemas de fuso horário
            const dateParts = data.dataProva.split('-');
            const dataProvaFormatted = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
            const nomeProvaText = data.nomeProva ? data.nomeProva : 'Não informado';
            
            infoSection.innerHTML = `
                <div class="info-card">
                    <h3><i class="fas fa-user"></i> Atleta</h3>
                    <p>${data.nomeAluno}</p>
                </div>
                <div class="info-card">
                    <h3><i class="fas fa-calendar"></i> Data da Prova</h3>
                    <p>${dataProvaFormatted}</p>
                </div>
                <div class="info-card">
                    <h3><i class="fas fa-trophy"></i> Prova</h3>
                    <p>${nomeProvaText}</p>
                </div>
                <div class="info-card">
                    <h3><i class="fas fa-clock"></i> Duração Total</h3>
                    <p>${data.totalSemanas} semanas</p>
                </div>
            `;
        }
        
        // Função de legenda removida conforme solicitado pelo usuário
        function generateLegend(periods) {
            // Função mantida vazia para evitar erros, mas não faz nada
            console.log("Legenda removida conforme solicitado");
        }
        
        function generateCycleTable(data) {
            const tableBody = document.getElementById('cycle-table-body');
            
            // Verificar se temos períodos para exibir
            if (!data.periods || data.periods.length === 0) {
                console.error("Nenhum período encontrado para gerar a tabela!");
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 30px;">
                            <div style="color: #666;">
                                <i class="fas fa-exclamation-circle" style="font-size: 2rem; margin-bottom: 15px; color: #FF8012;"></i>
                                <p>Nenhum período foi adicionado ao ciclo.</p>
                                <p>Por favor, volte e adicione períodos ao seu ciclo de treinamento.</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            console.log("Gerando tabela com", data.periods.length, "períodos");
            
            // Calcular data de início (sempre segunda-feira)
            const startDate = calculateStartDate(data.dataProva, data.totalSemanas);
            
            // Mapear períodos para classes CSS
            const periodClasses = {
                'base': 'period-base',
                'prep-geral': 'period-prep-geral',
                'recuperativa': 'period-recuperativa',
                'teste': 'period-teste',
                'prep-especifico': 'period-prep-especifico',
                'competitivo': 'period-competitivo',
                'polimento': 'period-polimento'
            };
            
            // Gerar linhas da tabela por blocos
            let tableHTML = '';
            let currentWeek = 0;
            
            data.periods.forEach((period, blockIndex) => {
                const blockStartWeek = currentWeek + 1;
                const blockEndWeek = currentWeek + period.weeks;
                
                const blockStartDate = new Date(startDate);
                blockStartDate.setDate(startDate.getDate() + (currentWeek * 7));
                
                const blockEndDate = new Date(startDate);
                blockEndDate.setDate(startDate.getDate() + ((currentWeek + period.weeks) * 7) - 1);
                
                // Linha do bloco/período
                const observation = period.observation || '';
                tableHTML += `
                    <tr class="block-row ${periodClasses[period.type]}">
                        <td>
                            <div class="block-header">${period.name}</div>
                            <div class="block-weeks">${period.weeks} semana${period.weeks > 1 ? 's' : ''} (${blockStartWeek}${period.weeks > 1 ? ` - ${blockEndWeek}` : ''})</div>
                        </td>
                        <td class="date-range">${formatDate(blockStartDate)}</td>
                        <td class="date-range">${formatDate(blockEndDate)}</td>
                        <td>
                            <div class="observations-display" style="white-space: pre-wrap; min-height: 80px; padding: 12px; border: 1px solid #ddd; border-radius: 5px; background-color: #f9f9f9;">
                                ${observation ? observation : '<span style="color: #999; font-style: italic;">Sem observações para este período</span>'}
                            </div>
                        </td>
                    </tr>
                `;
                
                // Linhas das semanas individuais (apenas informativas)
                for (let i = 0; i < period.weeks; i++) {
                    const weekNumber = currentWeek + i + 1;
                    const weekStartDate = new Date(startDate);
                    weekStartDate.setDate(startDate.getDate() + ((currentWeek + i) * 7));
                    
                    const weekEndDate = new Date(weekStartDate);
                    weekEndDate.setDate(weekStartDate.getDate() + 6);
                    
                    tableHTML += `
                        <tr class="week-row">
                            <td class="week-indent">↳ Semana ${weekNumber}</td>
                            <td>${formatDate(weekStartDate)}</td>
                            <td>${formatDate(weekEndDate)}</td>
                            <td class="week-observations"></td>
                        </tr>
                    `;
                }
                
                currentWeek += period.weeks;
            });
            
            tableBody.innerHTML = tableHTML;
        }
        
        function calculateStartDate(endDate, totalWeeks) {
            // Corrigir problema de fuso horário na data da prova
            const dateParts = endDate.split('-');
            const provaDate = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]));
            
            // A última semana deve terminar no domingo da semana da prova
            // Primeiro, encontrar o domingo da semana da prova
            const dayOfWeek = provaDate.getDay(); // 0 = domingo, 1 = segunda, etc.
            const lastSunday = new Date(provaDate);
            
            // Se a prova é no domingo, usar essa data
            // Senão, encontrar o próximo domingo
            if (dayOfWeek !== 0) {
                lastSunday.setDate(provaDate.getDate() + (7 - dayOfWeek));
            }
            
            // Agora calcular a data de início: última semana termina no lastSunday
            // Então a primeira semana começa (totalWeeks * 7) dias antes do lastSunday + 1
            const startDate = new Date(lastSunday);
            startDate.setDate(lastSunday.getDate() - (totalWeeks * 7) + 1);
            
            return startDate;
        }
        
        function formatDate(date) {
            return date.toLocaleDateString('pt-BR', {
