<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endurance On | Manutenção</title>
  <meta name="description" content="Estamos em manutenção. Voltamos em breve.">
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #f5f7fb;
      --muted: #b8c0cc;
      --accent: #ff7a00;
      --accent-2: #ffa24d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Montserrat, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -20%, rgba(255, 122, 0, 0.15), transparent),
        radial-gradient(900px 500px at 90% 120%, rgba(255, 162, 77, 0.10), transparent),
        var(--bg);
      padding: 24px;
    }
    .card {
      width: min(680px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00)), var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-2);
      border: 1px solid rgba(255, 162, 77, 0.35);
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.1;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 2.5vw, 19px);
      line-height: 1.55;
    }
    .time {
      margin-top: 18px;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      color: var(--accent);
    }
    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #9aa4b2;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">Atualização em andamento</span>
    <h1>Estamos em manutenção</h1>
    <p>Estamos fazendo melhorias no site para você ter uma experiência melhor.</p>
    <div class="time">Voltamos hoje às 16:00 (BRT)</div>
    <p class="footer">Obrigado pela paciência. Equipe Endurance On.</p>
  </main>
</body>
</html>
